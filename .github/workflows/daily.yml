name: Morning weather model check

# HRRR/NAM/GFS agreement check, pushed to ntfy.
on:
  schedule:
    # 15:00 UTC = 7 AM PST (winter) / 8 AM PDT (summer).
    # GitHub cron is UTC and does not follow DST. Change to "0 14 * * *" if
    # you prefer 7 AM PDT (= 6 AM PST in winter).
    - cron: "0 15 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check HRRR / NAM / GFS alignment and push to ntfy
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          LAT: ${{ vars.LAT }}
          LON: ${{ vars.LON }}
          LOCATION_NAME: ${{ vars.LOCATION_NAME }}
          TEMP_TOLERANCE_F: ${{ vars.TEMP_TOLERANCE_F }}
          PRECIP_TOLERANCE_IN: ${{ vars.PRECIP_TOLERANCE_IN }}
          NTFY_SERVER: ${{ vars.NTFY_SERVER }}
        run: python check_models.py
